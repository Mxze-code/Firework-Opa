name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Firework-Opa/package-lock.json

      - name: Install dependencies
        working-directory: Firework-Opa
        run: npm ci

      - name: Build static export
        working-directory: Firework-Opa
        env:
          GITHUB_PAGES_EXPORT: "true"
          # Muss mit GitHub-Pages-URL übereinstimmen; wird ins Client-Bundle inlined (öffentliche Bildpfade).
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Firework-Opa/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
