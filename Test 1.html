<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Einfache Beispiel-Webseite</title>
  <style>
    /* ----- CSS: Aussehen / Design ----- */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #e5e7eb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #020617;
      padding: 24px 28px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      max-width: 420px;
      width: 90%;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.8rem;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin-bottom: 20px;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #e5e7eb;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px #38bdf8;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.1s ease;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.35);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 14px 24px rgba(34, 197, 94, 0.4);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(34, 197, 94, 0.3);
    }

    .output {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px dashed #4b5563;
      min-height: 48px;
      font-size: 0.95rem;
      color: #e5e7eb;
      white-space: pre-line;
    }

    .output.empty {
      color: #6b7280;
      font-style: italic;
    }
  </style>
</head>
<body>
  <!-- ----- HTML: Struktur / Inhalt ----- -->
  <div class="card">
    <h1>Dein persönlicher Mini-Assistent</h1>
    <p class="subtitle">Gib deinen Namen oder eine Stimmung ein und klicke auf den Button.</p>

    <label for="userInput">Deine Eingabe:</label>
    <input id="userInput" type="text" placeholder="z.B. Moritz oder 'motiviert'">

    <button id="actionButton">Erstelle meine Nachricht</button>

    <div id="output" class="output empty">
      Hier erscheint gleich deine persönliche Nachricht.
    </div>
  </div>

  <script>
    // ----- JavaScript: Verhalten / Logik -----
    const input = document.getElementById("userInput");
    const button = document.getElementById("actionButton");
    const output = document.getElementById("output");

    button.addEventListener("click", function () {
      const text = input.value.trim();

      if (text === "") {
        output.textContent = "Bitte gib etwas ein, damit ich darauf reagieren kann 🙂";
        output.classList.remove("empty");
        return;
      }

      // Einfaches Beispiel, das auf die Eingabe reagiert
      const now = new Date();
      const time = now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

      const message =
        "Hallo " + text + "!\n\n" +
        "Schön, dass du hier bist. Basierend auf deiner Eingabe habe ich Folgendes für dich:\n" +
        "• Dies ist eine automatisch erzeugte Beispielnachricht.\n" +
        "• Sie zeigt dir, wie JavaScript auf Benutzereingaben reagieren kann.\n" +
        "• Aktuelle Uhrzeit: " + time + "\n\n" +
        "Probier ruhig andere Eingaben aus und klicke den Button erneut.";

      output.textContent = message;
      output.classList.remove("empty");
    });
  </script>
</body>
</html>
